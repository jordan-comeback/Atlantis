<style>
:root { --aura: oklch(0.55 0.09 0); --aura-dim: oklch(0.32 0.05 0); }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: "Noto Sans Georgian", system-ui, sans-serif;
  background: #0e0e12;
  color: #eceae4;
  min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 16px calc(24px + env(safe-area-inset-bottom));
}
#bg { position: fixed; inset: 0; z-index: -1; transition: background 1.2s ease; background: #0e0e12; }
.wrap { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
header { text-align: center; margin-top: 4px; }
header h1 { font-family: Fraunces, serif; font-weight: 300; font-size: 17px; letter-spacing: 0.14em; color: #8f8d86; text-transform: uppercase; }
.chord-name {
  font-family: "Cormorant Garamond", serif; font-style: italic; font-weight: 500;
  font-size: 68px; line-height: 1; color: var(--aura);
  letter-spacing: 0.005em;
  transition: color 0.8s ease; text-align: center; min-height: 70px;
}
.ring-box { position: relative; width: min(78vw, 320px); aspect-ratio: 1; }
svg { width: 100%; height: 100%; display: block; overflow: visible; }
.dot { cursor: pointer; transition: opacity 0.4s, r 0.3s; }
.dot-label { font-family: Fraunces, serif; font-size: 13px; pointer-events: none; }
.meter { width: 100%; max-width: 320px; }
.meter-track { height: 4px; border-radius: 2px; background: #26262c; overflow: hidden; }
.meter-fill { height: 100%; border-radius: 2px; background: var(--aura); width: 50%; transition: width 0.8s ease, background 0.8s ease; }
.meter-labels { display: flex; justify-content: space-between; font-size: 12px; color: #8f8d86; margin-top: 6px; }
.notes { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-content: flex-start; min-height: 114px; }
.note-chip {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 12px; border-radius: 999px;
  background: #1a1a20; border: 1px solid #2c2c34;
  font-size: 13px;
}
.note-chip .sw { width: 13px; height: 13px; border-radius: 50%; }
.note-chip .nm { font-family: Fraunces, serif; font-style: italic; font-size: 15px; }
.note-chip .hz { color: #8f8d86; font-size: 11px; }
.controls { display: flex; gap: 10px; width: 100%; max-width: 360px; }
input[type=text] {
  flex: 1; min-width: 0; height: 48px; padding: 0 16px;
  border-radius: 12px; border: 1px solid #2c2c34;
  background: #17171c; color: #eceae4;
  font-family: Fraunces, serif; font-size: 18px; outline: none;
}
input[type=text]:focus { border-color: var(--aura); }
button {
  height: 48px; padding: 0 18px; border-radius: 12px;
  border: 1px solid #2c2c34; background: #17171c; color: #eceae4;
  font-family: "Noto Sans Georgian", sans-serif; font-size: 15px; cursor: pointer;
  transition: border-color 0.3s, transform 0.1s;
}
button:active { transform: scale(0.97); }
#spectrum {
  width: min(78vw, 320px); height: 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.14);
  transition: background 0.8s ease;
}
#core { cursor: pointer; transform-box: fill-box; transform-origin: center; }
.halo { transform-box: fill-box; transform-origin: center; pointer-events: none; }
.h1 { animation: breathe1 4.5s ease-in-out infinite; }
.h2 { animation: breathe2 7s ease-in-out infinite; }
@keyframes breathe1 { 0%, 100% { transform: scale(1); opacity: 0.16; } 50% { transform: scale(1.10); opacity: 0.28; } }
@keyframes breathe2 { 0%, 100% { transform: scale(1); opacity: 0.07; } 50% { transform: scale(1.18); opacity: 0.15; } }
.pulse { animation: pulse 2.6s ease-out; }
@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  8% { transform: scale(1.08); }
  100% { transform: scale(1); opacity: 1; }
}
.chord-name { cursor: pointer; }
.presets { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.presets button { height: 36px; padding: 0 13px; font-family: Fraunces, serif; font-style: italic; font-size: 14px; font-weight: 500; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); color: #101014; }
.presets button.on { border-color: rgba(255,255,255,0.85); box-shadow: 0 0 0 1px rgba(255,255,255,0.4); }
.dice {
  height: 36px; padding: 0 14px; border-radius: 999px;
  font-family: "Noto Sans Georgian", sans-serif; font-style: normal;
  background: #17171c !important; color: #eceae4 !important;
  border: 1px dashed #4a4a54 !important; font-size: 14px;
}
.dice:active { transform: scale(0.95); }
.key-label { width: 100%; text-align: center; font-size: 12px; color: #8f8d86; margin-top: 2px; }

#voices { flex-wrap: nowrap; gap: 6px; max-width: 100%; }
#voices button {
  height: 32px; padding: 0 10px; border-radius: 999px; white-space: nowrap;
  font-family: "Noto Sans Georgian", sans-serif; font-style: normal; font-size: 12px;
  background: #17171c; color: #b8b6ae; border: 1px solid #2c2c34;
}
#voices button.on { border-color: var(--aura); color: #eceae4; }
.err { color: #e07a6a; font-size: 13px; min-height: 18px; }
.hint { font-size: 12px; color: #66645e; text-align: center; line-height: 1.6; max-width: 320px; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>

<body>
<div id="bg"></div>
<div class="wrap">
  <div class="chord-name" id="chordName">Cmaj7#11</div>
  <div id="spectrum" title="ნოტების ფერები წონების მიხედვით"></div>

  <div class="ring-box">
    <svg viewBox="0 0 320 320" id="ring" role="img" aria-label="კვინტების წრე ფერებით"></svg>
  </div>

  <div class="meter">
    <div class="meter-track"><div class="meter-fill" id="fill"></div></div>
    <div class="meter-labels"><span>დაძაბული</span><span id="purityTxt">—</span><span>სუფთა</span></div>
  </div>

  <div class="notes" id="notes"></div>

  <div class="controls">
    <input type="text" id="inp" value="" placeholder="Cmaj7#11" autocapitalize="off" autocomplete="off" spellcheck="false" aria-label="აკორდის ჩანაწერი">
    <button id="go">→</button>
  </div>
  <div class="err" id="err"></div>

  <div class="presets" id="voices"></div>

  <div class="presets" id="presets"></div>
  <div class="divider"></div>
  <div class="presets" id="chorus"></div>
  <div class="divider"></div>
  <div id="tabs" style="display:flex; gap:16px; flex-wrap:wrap; justify-content:center; width:100%;"></div>

</div>

<script>
const NAMES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const FLAT = {"Db":"C#","Eb":"D#","Gb":"F#","Ab":"G#","Bb":"A#"};
const semi = n => NAMES.indexOf(FLAT[n] || n);
const cof = s => (s*7) % 12;
const hueOf = s => cof(s) * 30;
const col = (h, s, l, a) => `oklch(${(0.53 + l / 100 * 0.39).toFixed(3)} ${(s / 100 * 0.28).toFixed(3)} ${h}${a != null ? " / " + a : ""})`;
const colDim = (h, s, l, a) => `oklch(${(0.25 + l / 100 * 0.55).toFixed(3)} ${(s / 100 * 0.21).toFixed(3)} ${h}${a != null ? " / " + a : ""})`;

function parseChord(str){
  str = str.trim();
  let bass = null;
  const sl = str.split("/");
  if(sl.length === 2){
    const bs = semi(sl[1].trim());
    if(bs >= 0){ bass = bs; str = sl[0].trim(); }
  }
  const m = str.match(/^([A-G])([#b]?)(.*)$/);
  if(!m) return null;
  const root = m[1] + m[2];
  let q = m[3];
  let iv = new Set([0,4,7]);
  const has = t => { if(q.includes(t)){ q = q.replace(t,""); return true; } return false; };
  if(has("maj9") || has("Δ9")) { iv.add(11); iv.add(14); }
  if(has("maj7") || has("M7")) iv.add(11);
  if(has("dim7")){ iv.delete(4); iv.delete(7); iv.add(3); iv.add(6); iv.add(9); }
  else if(has("dim")){ iv.delete(4); iv.delete(7); iv.add(3); iv.add(6); }
  else if(has("aug")){ iv.delete(7); iv.add(8); }
  else if(has("sus4")){ iv.delete(4); iv.add(5); }
  else if(has("sus2")){ iv.delete(4); iv.add(2); }
  else if(/^m(?!aj)/.test(q)){ q = q.replace(/^m/,""); iv.delete(4); iv.add(3); }
  if(has("13")){ iv.add(10); iv.add(14); iv.add(21); }
  if(has("#11")) iv.add(18);
  if(has("11")){ iv.add(10); iv.add(14); iv.add(17); }
  if(has("b9")){ iv.add(10); iv.add(13); }
  if(has("#9")){ iv.add(10); iv.add(15); }
  if(has("add9")) iv.add(14);
  else if(has("9")){ iv.add(10); iv.add(14); }
  if(has("b5")){ iv.delete(7); iv.add(6); }
  if(has("#5")){ iv.delete(7); iv.add(8); }
  if(has("6")) iv.add(9);
  if(has("7")) iv.add(10);
  const rs = semi(root);
  if(rs < 0) return null;
  return { root, rootSemi: rs, intervals: [...iv].sort((a,b)=>a-b), bass };
}

function roleOf(i){
  if(i === 0) return "ფუძე";
  if(i === 3) return "მინ. ტერცია";
  if(i === 4) return "ტერცია";
  if(i === 5) return "კვარტა";
  if(i === 6) return "შემც. კვინტა";
  if(i === 7) return "კვინტა";
  if(i === 8) return "გად. კვინტა";
  if(i === 9) return "სექსტა";
  if(i === 10) return "სეპტიმა";
  if(i === 11) return "დიდი სეპტიმა";
  if(i === 13) return "b9";
  if(i === 14) return "ნონა";
  if(i === 15) return "#9";
  if(i === 17) return "11";
  if(i === 18) return "#11";
  if(i === 21) return "13";
  return "";
}

function buildNotes(ch){
  const rootMidi = 48 + ch.rootSemi;
  const arr = ch.intervals.map(i => {
    const midi = rootMidi + i;
    const s = midi % 12;
    const w = i === 0 ? (ch.bass != null ? 0.8 : 1.0) : i <= 7 ? 0.7 : i <= 11 ? 0.6 : 0.5;
    const sat = i >= 12 ? 85 : 65;
    return {
      name: NAMES[s], semi: s, midi,
      hue: hueOf(s),
      light: Math.round(30 + (midi - 40) / 40 * 45),
      sat, w, role: roleOf(i),
      freq: 440 * Math.pow(2, (midi - 69) / 12)
    };
  });
  if(ch.bass != null){
    const bm = 36 + ch.bass;
    arr.unshift({
      name: NAMES[ch.bass], semi: ch.bass, midi: bm,
      hue: hueOf(ch.bass),
      light: Math.round(30 + (bm - 40) / 40 * 45),
      sat: 65, w: 1.0, role: "ბასი",
      freq: 440 * Math.pow(2, (bm - 69) / 12)
    });
  }
  return arr;
}

function blend(notes){
  let x = 0, y = 0, W = 0, L = 0;
  for(const n of notes){
    const r = n.hue * Math.PI / 180;
    x += n.w * Math.cos(r); y += n.w * Math.sin(r);
    W += n.w; L += n.w * n.light;
  }
  if(!W) return { hue: 0, sat: 0, light: 40, purity: 0 };
  const purity = Math.sqrt(x*x + y*y) / W;
  let hue = Math.atan2(y, x) * 180 / Math.PI; if(hue < 0) hue += 360;
  return { hue: Math.round(hue), sat: Math.round(15 + purity * 65), light: Math.round(L / W), purity };
}

const CX = 160, CY = 160, R = 128;
const posOf = s => { const a = (cof(s) * 30 - 90) * Math.PI / 180; return [CX + R * Math.cos(a), CY + R * Math.sin(a)]; };

const ring = document.getElementById("ring");
let currentNotes = [];
let customSet = null;

function drawRing(){
  const active = new Set(currentNotes.map(n => n.semi));
  let poly = "", dots = "";
  const pts = [...active].map(s => posOf(s));
  if(pts.length > 1){
    const ordered = [...active].sort((a,b) => cof(a) - cof(b)).map(s => posOf(s));
    poly = '<polygon points="' + ordered.map(p => p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ") + '" fill="none" stroke="rgba(236,234,228,0.35)" stroke-width="1.2"/>';
  }
  for(let s = 0; s < 12; s++){
    const [x, y] = posOf(s);
    const on = active.has(s);
    const note = currentNotes.find(n => n.semi === s);
    const fillC = on ? col(hueOf(s), note ? note.sat : 65, note ? note.light : 55) : col(hueOf(s), 30, 30);
    const r = on ? 16 + (note ? note.w * 6 : 0) : 11;
    dots += `<circle class="dot" data-s="${s}" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" fill="${fillC}" opacity="${on ? 1 : 0.45}" stroke="${on ? "rgba(236,234,228,0.7)" : "none"}" stroke-width="1.5"/>`;
    dots += `<text class="dot-label" x="${x.toFixed(1)}" y="${(y + 4.5).toFixed(1)}" text-anchor="middle" fill="${on ? "#0e0e12" : "#8f8d86"}">${NAMES[s]}</text>`;
  }
  const bc = lastBlend || { hue: 0, sat: 0, light: 40 };
  const core = `<circle id="core" cx="${CX}" cy="${CY}" r="52" fill="${col(bc.hue, bc.sat, bc.light)}" opacity="0.9"/>`
    + `<circle class="halo h1" cx="${CX}" cy="${CY}" r="62" fill="${col(bc.hue, bc.sat, bc.light)}" opacity="0.18"/>`
    + `<circle class="halo h2" cx="${CX}" cy="${CY}" r="74" fill="${col(bc.hue, bc.sat, bc.light)}" opacity="0.08"/>`;
  ring.innerHTML = `<circle cx="${CX}" cy="${CY}" r="${R}" fill="none" stroke="#26262c" stroke-width="1"/>` + core + poly + dots;
  ring.querySelectorAll(".dot").forEach(d => d.addEventListener("click", () => toggleNote(+d.dataset.s)));
  document.getElementById("core").addEventListener("click", playChord);
}

let lastBlend = null;
function render(notes, label){
  currentNotes = notes;
  document.getElementById("chordName").textContent = label || " ";
  const b = blend(notes);
  lastBlend = notes.length ? b : null;
  document.getElementById("purityTxt").textContent = notes.length ? Math.round(b.purity * 100) + "%" : "—";
  document.documentElement.style.setProperty("--aura", col(b.hue, b.sat, Math.max(b.light, 42)));
  document.documentElement.style.setProperty("--aura-dim", colDim(b.hue, Math.round(b.sat * 0.6), 15));
  document.getElementById("fill").style.width = (notes.length ? Math.round(b.purity * 100) : 0) + "%";

  const W = notes.reduce((s, n) => s + n.w, 0) || 1;
  let acc = 0;
  const stops = notes.map(n => {
    const from = acc / W * 100; acc += n.w;
    const to = acc / W * 100;
    return `${col(n.hue, n.sat, n.light)} ${from.toFixed(1)}% ${to.toFixed(1)}%`;
  });
  document.getElementById("spectrum").style.background =
    notes.length ? `linear-gradient(90deg, ${stops.join(", ")})` : "#26262c";

  const layers = notes.map((n, i) => {
    const x = notes.length > 1 ? 12 + i * (76 / (notes.length - 1)) : 50;
    const y = 6 + (i % 3) * 12;
    const a = (0.16 + n.w * 0.14).toFixed(2);
    return `radial-gradient(55% 42% at ${x.toFixed(0)}% ${y}%, ${colDim(n.hue, n.sat, 26, a)}, transparent 70%)`;
  });
  document.getElementById("bg").style.background = layers.length ? layers.join(", ") + ", #0e0e12" : "#0e0e12";
  const nd = document.getElementById("notes");
  nd.innerHTML = notes.map(n =>
    `<span class="note-chip"><span class="sw" style="background:${col(n.hue, n.sat, n.light)}"></span><span class="nm">${n.name}</span><span class="hz">${n.role ? n.role + " · " : ""}${Math.round(n.freq)} Hz</span></span>`
  ).join("");
  drawRing();
}

function renderChordStr(str){
  const ch = parseChord(str);
  const err = document.getElementById("err");
  if(!ch || !ch.intervals.length){ err.textContent = "ვერ გავშიფრე: " + str; return; }
  err.textContent = "";
  customSet = null;
  render(buildNotes(ch), str.trim());
  renderTabs(ch);
}

const TUN = [40,45,50,55,59,64];

function findVoicings(ch){
  const pcs = new Set(ch.intervals.map(i => (ch.rootSemi + i) % 12));
  const rootPc = ch.rootSemi;
  const bassPc = ch.bass != null ? ch.bass : rootPc;
  let target = 36 + bassPc; while(target < 40) target += 12;
  const found = [];
  for(let pos = 0; pos <= 11; pos++){
    const lo = pos === 0 ? 0 : pos, hi = pos + 3;
    const opts = TUN.map(open => {
      const o = [-1];
      for(let f = lo; f <= hi; f++) if(pcs.has((open + f) % 12)) o.push(f);
      return o;
    });
    const frets = new Array(6);
    (function rec(si){
      if(si === 6){
        const snd = [];
        for(let s = 0; s < 6; s++) if(frets[s] >= 0) snd.push([s, TUN[s] + frets[s]]);
        if(snd.length < 3) return;
        const covered = new Set(snd.map(x => x[1] % 12));
        if(!covered.has(rootPc)) return;
        let missing = 0;
        pcs.forEach(p => { if(!covered.has(p)) missing++; });
        if(missing > 1) return;
        let interior = 0;
        const first = snd[0][0], last = snd[snd.length - 1][0];
        for(let s = first; s <= last; s++) if(frets[s] < 0) interior++;
        const lowest = snd[0][1];
        const fr = frets.filter(f => f > 0);
        const base = fr.length ? Math.min(...fr) : 1;
        let score = snd.length * 6
          - missing * 35
          - interior * 18
          - (lowest % 12 !== bassPc ? 25 : 0)
          - Math.abs(lowest - target) * 2
          - pos * 0.4;
        found.push({ frets: frets.slice(), base, score, key: frets.join(",") });
        return;
      }
      for(const f of opts[si]){ frets[si] = f; rec(si + 1); }
    })(0);
  }
  found.sort((a, b) => b.score - a.score);
  const picked = [];
  for(const v of found){
    if(picked.some(p => p.key === v.key)) continue;
    if(picked.length && picked.some(p => Math.abs(p.base - v.base) < 2)) continue;
    picked.push(v);
    if(picked.length === 3) break;
  }
  return picked;
}

function tabEl(v, exact){
  const cellW = 30, gap = 14, nutX = 20, top = 12;
  const W = nutX + cellW * 4 + 12, H = top + gap * 5 + 20;
  const base = v.base;
  let s = '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">';
  for(let i = 0; i < 6; i++){
    const y = top + i * gap;
    s += '<line x1="' + nutX + '" y1="' + y + '" x2="' + (nutX + cellW * 4) + '" y2="' + y + '" stroke="#3a3a44" stroke-width="1"/>';
  }
  for(let f = 0; f <= 4; f++){
    const x = nutX + f * cellW;
    const w = (base === 1 && f === 0) ? 3.5 : 1;
    s += '<line x1="' + x + '" y1="' + top + '" x2="' + x + '" y2="' + (top + gap * 5) + '" stroke="#3a3a44" stroke-width="' + w + '"/>';
  }
  for(let str = 0; str < 6; str++){
    const y = top + (5 - str) * gap;
    const f = v.frets[str];
    if(f < 0){
      s += '<text x="' + (nutX - 11) + '" y="' + (y + 3.5) + '" font-size="10" fill="#55535c">×</text>';
    } else if(f === 0){
      s += '<circle cx="' + (nutX - 9) + '" cy="' + y + '" r="3.4" fill="none" stroke="#8f8d86" stroke-width="1.2"/>';
    } else {
      const x = nutX + (f - base + 0.5) * cellW;
      s += '<circle cx="' + x + '" cy="' + y + '" r="6.4" fill="#e9e7e1"/>';
    }
  }
  if(base > 1){
    s += '<text x="' + (nutX + cellW * 0.5) + '" y="' + (top + gap * 5 + 16) + '" font-size="11" fill="#8f8d86" text-anchor="middle">' + base + '</text>';
  }
  s += '</svg>';
  const d = document.createElement("div");
  d.style.cssText = "text-align:center;";
  d.innerHTML = s + '<div style="font-size:11px; margin-top:-4px; color:' + (exact ? "var(--aura)" : "#66645e") + ';">' + (exact ? "ზუსტი ჟღერადობა" : "ალტ. პოზიცია") + '</div>';
  return d;
}

function renderTabs(ch){
  const box = document.getElementById("tabs");
  box.innerHTML = "";
  const vs = findVoicings(ch);
  vs.forEach((v, i) => box.appendChild(tabEl(v, i === 0)));
}

function toggleNote(s){
  if(customSet === null) customSet = new Set(currentNotes.map(n => n.semi));
  if(customSet.has(s)) customSet.delete(s); else customSet.add(s);
  const arr = [...customSet].sort((a,b) => a - b);
  const notes = arr.map((sv, idx) => {
    const midi = 48 + sv + (idx && sv < arr[0] ? 12 : 0);
    return {
      name: NAMES[sv], semi: sv, midi,
      hue: hueOf(sv),
      light: Math.round(30 + (midi - 40) / 40 * 45),
      sat: 70, w: idx === 0 ? 1.0 : 0.7, role: "",
      freq: 440 * Math.pow(2, (midi - 69) / 12)
    };
  });
  render(notes, notes.length ? notes.map(n => n.name).join(" ") : "—");
  document.getElementById("tabs").innerHTML = "";
  playChord();
}

let actx = null, master = null, wet = null;
let voice = "rhodes";

function ensureAudio(){
  if(actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  const comp = actx.createDynamicsCompressor();
  comp.threshold.value = -18; comp.knee.value = 20;
  comp.ratio.value = 4; comp.attack.value = 0.004; comp.release.value = 0.3;
  master = actx.createGain();
  master.gain.value = 0.9;
  master.connect(comp);
  comp.connect(actx.destination);
  const conv = actx.createConvolver();
  const rate = actx.sampleRate, dur = 2.4, len = Math.floor(rate * dur);
  const buf = actx.createBuffer(2, len, rate);
  for(let c = 0; c < 2; c++){
    const d = buf.getChannelData(c);
    for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3.2);
  }
  conv.buffer = buf;
  wet = actx.createGain();
  wet.gain.value = 0.32;
  master.connect(conv);
  conv.connect(wet);
  wet.connect(comp);
}

function voiceEnv(t, dur){
  const g = actx.createGain();
  const f = actx.createBiquadFilter();
  f.type = "lowpass";
  f.connect(g); g.connect(master);
  return { g, f, spawn(type, fr, det, lg, wave){
    const o = actx.createOscillator();
    if(wave) o.setPeriodicWave(wave); else o.type = type;
    o.frequency.value = fr; o.detune.value = det;
    const og = actx.createGain(); og.gain.value = lg;
    o.connect(og); og.connect(f);
    o.start(t); o.stop(t + dur);
  }};
}

function playNote(freq, vel, t){
  if(voice === "vibes"){
    const dur = 4.2;
    const g = actx.createGain();
    const trem = actx.createGain();
    trem.gain.value = 1;
    g.connect(trem); trem.connect(master);
    const lfo = actx.createOscillator();
    lfo.frequency.value = 5.1;
    const lg = actx.createGain(); lg.gain.value = 0.22;
    lfo.connect(lg); lg.connect(trem.gain);
    lfo.start(t); lfo.stop(t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vel * 1.15, t + 0.012);
    g.gain.setTargetAtTime(0.0001, t + 0.18, 1.15);
    const o1 = actx.createOscillator();
    o1.type = "sine"; o1.frequency.value = freq;
    const g1 = actx.createGain(); g1.gain.value = 1;
    o1.connect(g1); g1.connect(g);
    o1.start(t); o1.stop(t + dur);
    const o2 = actx.createOscillator();
    o2.type = "sine"; o2.frequency.value = freq * 4;
    const g2 = actx.createGain();
    g2.gain.setValueAtTime(0.16, t);
    g2.gain.setTargetAtTime(0.0001, t + 0.05, 0.3);
    o2.connect(g2); g2.connect(g);
    o2.start(t); o2.stop(t + dur);
    return;
  }
  if(voice === "pad"){
    const v = voiceEnv(t, 5.2);
    v.g.gain.setValueAtTime(0, t);
    v.g.gain.linearRampToValueAtTime(vel * 0.8, t + 0.38);
    v.g.gain.setTargetAtTime(vel * 0.55, t + 0.6, 0.8);
    v.g.gain.setTargetAtTime(0.0001, t + 2.4, 0.9);
    v.f.Q.value = 0.5;
    v.f.frequency.setValueAtTime(480, t);
    v.f.frequency.setTargetAtTime(Math.min(freq * 3.2, 2300), t + 0.05, 0.5);
    v.spawn("sawtooth", freq, 7, 0.34);
    v.spawn("sawtooth", freq, -7, 0.34);
    v.spawn("sine", freq, 0, 0.5);
    v.spawn("sine", freq * 2, 0, 0.07);
    return;
  }
  const v = voiceEnv(t, 3.2);
  v.g.gain.setValueAtTime(0, t);
  v.g.gain.linearRampToValueAtTime(vel, t + 0.025);
  v.g.gain.setTargetAtTime(vel * 0.45, t + 0.05, 0.35);
  v.g.gain.setTargetAtTime(0.0001, t + 1.2, 0.65);
  v.f.Q.value = 0.6;
  v.f.frequency.setValueAtTime(Math.min(freq * 5, 5200), t);
  v.f.frequency.setTargetAtTime(Math.max(freq * 1.6, 500), t + 0.04, 0.5);
  v.spawn("sine", freq, 0, 1.0);
  v.spawn("triangle", freq, 5, 0.45);
  v.spawn("triangle", freq, -5, 0.45);
  v.spawn("sine", freq * 2, 0, 0.13);
}

const VOICES = [
  ["rhodes", "Rhodes"],
  ["vibes", "ვიბრაფონი"],
  ["pad", "Dolby პადი"]
];
const vd = document.getElementById("voices");
VOICES.forEach(([id, label]) => {
  const b = document.createElement("button");
  b.textContent = label;
  if(id === voice) b.classList.add("on");
  b.addEventListener("click", () => {
    voice = id;
    vd.querySelectorAll("button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    playChord();
  });
  vd.appendChild(b);
});

function playChord(){
  if(!currentNotes.length) return;
  ensureAudio();
  if(actx.state === "suspended") actx.resume();
  const t0 = actx.currentTime + 0.02;
  currentNotes.forEach((n, i) => {
    playNote(n.freq, 0.09 * n.w, t0 + i * 0.055);
  });
  const c = document.getElementById("core");
  if(c){ c.classList.remove("pulse"); void c.getBBox; c.classList.add("pulse"); }
}

document.getElementById("chordName").addEventListener("click", playChord);
document.getElementById("go").addEventListener("click", () => { renderChordStr(document.getElementById("inp").value); playChord(); });
document.getElementById("inp").addEventListener("keydown", e => { if(e.key === "Enter"){ e.target.blur(); renderChordStr(e.target.value); playChord(); } });

const pd = document.getElementById("presets");
const cd = document.getElementById("chorus");

function chipColor(str){
  const ch = parseChord(str);
  if(!ch) return col(0, 0, 30);
  const b = blend(buildNotes(ch));
  const l = Math.min(Math.max(b.light, 44), 62);
  return col(b.hue, Math.max(b.sat, 30), l);
}

let curKey = 0;

function spellDeg(key){
  return ([d, q, bd]) => SPELL[(key + d) % 12] + q + (bd != null ? "/" + SPELL[(key + bd) % 12] : "");
}

function makeChip(p, container){
  const b = document.createElement("button");
  b.textContent = p;
  b.style.background = chipColor(p);
  b.addEventListener("click", () => {
    document.getElementById("inp").value = p;
    renderChordStr(p);
    playChord();
    pd.querySelectorAll("button").forEach(x => x.classList.remove("on"));
    cd.querySelectorAll("button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
  });
  container.appendChild(b);
}

function renderMain(list, keyLabel){
  pd.innerHTML = "";
  const dice = document.createElement("button");
  dice.className = "dice";
  dice.textContent = "🎲";
  dice.setAttribute("aria-label", "ახალი პალიტრა");
  dice.addEventListener("click", rollPalette);
  pd.appendChild(dice);
  list.forEach(p => makeChip(p, pd));
  if(keyLabel){
    const k = document.createElement("div");
    k.className = "key-label";
    k.textContent = keyLabel;
    pd.appendChild(k);
  }
}

function renderChorus(list, keyLabel){
  cd.innerHTML = "";
  const dice = document.createElement("button");
  dice.className = "dice";
  dice.textContent = "🎲";
  dice.setAttribute("aria-label", "ახალი გადასვლა");
  dice.addEventListener("click", rollChorus);
  cd.appendChild(dice);
  list.forEach(p => makeChip(p, cd));
  if(keyLabel){
    const k = document.createElement("div");
    k.className = "key-label";
    k.textContent = keyLabel;
    cd.appendChild(k);
  }
}

function rollChorus(){
  const t = CHO_TEMPLATES[Math.floor(Math.random() * CHO_TEMPLATES.length)];
  const k2 = (curKey + t.shift) % 12;
  renderChorus(t.deg.map(spellDeg(k2)), "გადასვლა: " + SPELL[k2] + " · " + t.label);
}

function rollPalette(){
  curKey = Math.floor(Math.random() * 12);
  const t = TEMPLATES[Math.floor(Math.random() * TEMPLATES.length)];
  renderMain(t.deg.map(spellDeg(curKey)), "ტონალობა: " + SPELL[curKey] + (t.major ? "" : "m") + " · " + t.name);
  rollChorus();
}
